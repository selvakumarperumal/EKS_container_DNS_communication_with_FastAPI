{{- if .Values.networkPolicy.enabled }}
---
# Default deny all ingress/egress in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow FastAPI pods to receive traffic from ALB / Istio ingress gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fastapi-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # From ALB (kube-system namespace — LB controller healthchecks)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    # From Istio ingress gateway
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    # From Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
---
# Allow FastAPI → PostgreSQL (CNPG cluster + pooler)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fastapi-to-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # To CNPG pods (5432)
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.postgresql.clusterName }}
      ports:
        - protocol: TCP
          port: 5432
    # To PgBouncer pooler (5432)
    {{- if .Values.pooler.enabled }}
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/poolerName: {{ .Values.pooler.name }}
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
---
# Allow FastAPI → Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fastapi-to-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
---
# Allow FastAPI → DNS (CoreDNS in kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fastapi-dns
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow FastAPI → AWS endpoints (S3, Secrets Manager via HTTPS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fastapi-aws
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
---
# Allow FastAPI → OTel collector (observability namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fastapi-to-otel
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317  # OTLP gRPC
        - protocol: TCP
          port: 4318  # OTLP HTTP
{{- end }}
